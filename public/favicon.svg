<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Trending">
  <!-- Source-agnostic "Trending" mark: ascending bars under a rising trend
       arrow, in the site's paper/ink/vermilion editorial palette. Works for
       GitHub, Product Hunt, YC, and any future ranking source. -->
  <rect width="64" height="64" rx="14" fill="#211c15"/>
  <g fill="#f7f3ea">
    <rect x="13" y="40" width="9" height="13" rx="1.5"/>
    <rect x="27.5" y="33" width="9" height="20" rx="1.5"/>
    <rect x="42" y="26" width="9" height="27" rx="1.5"/>
  </g>
  <polyline points="13,30 26,20 35,26 50,12" fill="none" stroke="#bf3b2b" stroke-width="5.5"
    stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="40,12 50,12 50,22" fill="none" stroke="#bf3b2b" stroke-width="5.5"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
