<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />

    <title>GitHub Trending 每日汇总 · 每日/每周/每月最热开源项目排行</title>

    />

    <!-- canonical & language alternates (replace your-domain.com) -->
    <link rel="canonical" href="https://your-domain.com/" />
    <link rel="alternate" hreflang="zh-CN" href="https://your-domain.com/" />
