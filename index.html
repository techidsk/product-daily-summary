<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ──────────────── Primary SEO ──────────────── -->
    <title>GitHub Trending — Daily, Weekly &amp; Monthly Top Open-Source Repos</title>
    <meta
      name="description"
      content="Track the hottest trending repositories on GitHub — daily, weekly and monthly rankings with language filters (JavaScript, TypeScript, Python, Go, Rust and more), historical archives you can revisit, and one-click share cards."
    />
    <meta
      name="keywords"
      content="GitHub Trending, trending repositories, daily trending repos, open source ranking, most starred GitHub repos, weekly trending, monthly trending, JavaScript trending, Python trending, Rust trending, trending open source projects"
    />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <meta name="author" content="GitHub Trending Daily" />
    <meta name="theme-color" content="#bf3b2b" />
    <meta name="color-scheme" content="light" />
    <meta name="application-name" content="Trending" />
    <meta name="apple-mobile-web-app-title" content="Trending" />

    <!-- canonical (replace your-domain.com). Single URL serves all three UI
         languages client-side, so we don't emit per-language hreflang (that
         requires distinct URLs); en is the primary indexed language. -->
    <link rel="canonical" href="https://your-domain.com/" />
    <link rel="alternate" hreflang="x-default" href="https://your-domain.com/" />

    <!-- icons & PWA manifest -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ──────────────── Open Graph ──────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="GitHub Trending Daily" />
    <meta property="og:title" content="GitHub Trending — Daily, Weekly &amp; Monthly Top Repos" />
    <meta
      property="og:description"
      content="The hottest open-source projects on GitHub, ranked daily / weekly / monthly. Filter by language and revisit archived days."
    />
    <meta property="og:url" content="https://your-domain.com/" />
    <meta property="og:image" content="https://your-domain.com/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Trending — daily, weekly &amp; monthly top open-source repos on GitHub" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="zh_CN" />
    <meta property="og:locale:alternate" content="ja_JP" />

    <!-- ──────────────── Twitter ──────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GitHub Trending — Daily, Weekly &amp; Monthly Top Repos" />
    <meta
      name="twitter:description"
      content="The hottest open-source projects on GitHub, ranked daily / weekly / monthly. Filter by language and revisit archived days."
    />
    <meta name="twitter:image" content="https://your-domain.com/og.png" />
    <meta name="twitter:image:alt" content="Trending — daily, weekly &amp; monthly top open-source repos on GitHub" />

    <!-- ──────────────── Structured data ──────────────── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "GitHub Trending Daily",
        "alternateName": "Trending — Daily Open-Source Digest",
        "url": "https://your-domain.com/",
        "description": "Track the hottest trending repositories on GitHub — daily, weekly and monthly rankings with language filters and historical archives.",
        "inLanguage": ["en", "zh-CN", "ja"]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "GitHub Trending Daily",
        "url": "https://your-domain.com/",
        "logo": "https://your-domain.com/icon-512.png"
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "How often is the data updated?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "A scheduled job fetches the rankings every few hours, keeping the list close to GitHub's live Trending page."
            }
          },
          {
            "@type": "Question",
            "name": "Where does the historical data come from?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "GitHub only shows the current day; earlier days are backfilled from the Internet Archive (Wayback Machine). Highlighted dates in the calendar are the archived days you can revisit."
            }
          },
          {
            "@type": "Question",
            "name": "Can I filter by programming language?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes — JavaScript, TypeScript, Python, Go, Rust, Java, C++ and more. The ranking updates when you switch languages."
            }
          }
        ]
      }
    </script>

    <!-- Google AdSense is loaded at runtime by src/lib/ads.js, gated on the
         VITE_ADSENSE_CLIENT env var. No script runs until that id is set, so
         there is nothing to edit here. See .env.example for the AdSense vars. -->
  </head>
  <body>
    <div id="root">
      <!-- prerender:start -->
      <!-- Static fallback for crawlers / no-JS. Replaced by React on load,
           and overwritten with the live ranking by server/prerender.js at build. -->
      <noscript>
        <p>This site needs JavaScript for the full interactive ranking of GitHub trending repositories.</p>
      </noscript>
      <!-- prerender:end -->
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
